<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Photo Galli</title>
    <!-- Bootstrap CSS for responsive grid utilities -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Custom retro styles -->
    <link rel="stylesheet" href="../css/style.css" />
    <!-- EmailJS SDK for OTP email sending -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
  </head>
  <body>
    <!-- ============================================================
         NAVBAR - Minimal for sign-in page
         ============================================================ -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <!-- Brand / Logo -->
        <a class="navbar-brand" href="signin.html"> Photo<span>Galli</span> </a>

        <!-- Theme toggle in navbar -->
        <button id="themeToggleBtn" class="theme-toggle-btn ms-auto">
          ☀️ Light
        </button>
      </div>
    </nav>

    <!-- ============================================================
         SIGN-IN CONTENT
         ============================================================ -->
    <div class="page-wrapper">
      <div class="auth-page">
        <div class="auth-card">
          <!-- Title -->
          <h1 class="auth-title">PHOTO GALLI</h1>
          <p class="auth-subtitle">AI Image Generator — Sign in to continue</p>

          <!-- Guest mode banner -->
          <div class="guest-banner">
            <span>🎮 Try it free — no account needed</span>
            <button
              type="button"
              id="guestModeBtn"
              class="btn-retro btn-retro-ghost btn-retro-sm"
            >
              Continue as Guest (2 free)
            </button>
          </div>

          <!-- Role Selector: User or Admin -->
          <div class="role-selector" role="group" aria-label="Select role">
            <button
              type="button"
              class="role-btn active"
              id="roleUserBtn"
              aria-pressed="true"
            >
              👤 User
            </button>
            <button
              type="button"
              class="role-btn"
              id="roleAdminBtn"
              aria-pressed="false"
            >
              🛡 Admin
            </button>
          </div>

          <!-- Sign-in Form -->
          <form id="signinForm" novalidate>
            <!-- Username -->
            <div class="form-group">
              <label class="form-label" for="usernameInput">Username</label>
              <input
                type="text"
                id="usernameInput"
                class="form-control-retro"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>

            <!-- Password -->
            <div class="form-group">
              <label class="form-label" for="passwordInput">Password</label>
              <input
                type="password"
                id="passwordInput"
                class="form-control-retro"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
            </div>

            <!-- Error message -->
            <div
              id="signinError"
              class="alert-retro alert-retro-danger d-none mb-3"
              role="alert"
            ></div>

            <!-- Submit button -->
            <button
              type="submit"
              class="btn-retro btn-retro-primary btn-retro-full"
            >
              ▶ Sign In
            </button>
          </form>

          <!-- Forgot Password link -->
          <div style="text-align: center; margin-top: 0.75rem">
            <button
              type="button"
              id="forgotPasswordBtn"
              class="btn-retro btn-retro-ghost btn-retro-sm"
              style="font-size: 0.75rem"
            >
              🔑 Forgot Password?
            </button>
          </div>

          <!-- ============================================================
               FORGOT PASSWORD FLOW (hidden by default)
               Step 1: Enter username → send OTP
               Step 2: Enter OTP
               Step 3: Enter new password
               ============================================================ -->
          <div id="forgotPasswordSection" class="d-none mt-3">
            <div
              style="
                border-top: 1px solid var(--border-color);
                padding-top: 1rem;
                margin-top: 0.5rem;
              "
            >
              <h3
                style="
                  font-family: &quot;VT323&quot;, monospace;
                  font-size: 1.2rem;
                  color: var(--accent-secondary);
                  margin-bottom: 1rem;
                  text-transform: uppercase;
                  letter-spacing: 1px;
                "
              >
                🔑 Reset Password
              </h3>

              <!-- Step 1: Username input -->
              <div id="fpStep1">
                <div class="form-group">
                  <label class="form-label" for="fpUsernameInput"
                    >Your Username</label
                  >
                  <input
                    type="text"
                    id="fpUsernameInput"
                    class="form-control-retro"
                    placeholder="Enter your username"
                    autocomplete="off"
                  />
                </div>
                <div
                  id="fpStep1Error"
                  class="alert-retro alert-retro-danger d-none mb-3"
                  role="alert"
                ></div>
                <button
                  type="button"
                  id="fpSendOtpBtn"
                  class="btn-retro btn-retro-primary btn-retro-full"
                >
                  📧 Send OTP to Email
                </button>
              </div>

              <!-- Step 2: OTP verification -->
              <div id="fpStep2" class="d-none">
                <p
                  id="fpEmailHint"
                  style="
                    font-size: 0.8rem;
                    color: var(--text-muted);
                    margin-bottom: 0.75rem;
                  "
                ></p>
                <div class="form-group">
                  <label class="form-label" for="fpOtpInput"
                    >Enter 6-digit OTP</label
                  >
                  <input
                    type="text"
                    id="fpOtpInput"
                    class="form-control-retro"
                    placeholder="123456"
                    maxlength="6"
                    autocomplete="one-time-code"
                    inputmode="numeric"
                  />
                </div>
                <div
                  id="fpStep2Error"
                  class="alert-retro alert-retro-danger d-none mb-3"
                  role="alert"
                ></div>
                <div style="display: flex; gap: 0.5rem">
                  <button
                    type="button"
                    id="fpVerifyOtpBtn"
                    class="btn-retro btn-retro-primary"
                    style="flex: 1"
                  >
                    ✓ Verify OTP
                  </button>
                  <button
                    type="button"
                    id="fpResendOtpBtn"
                    class="btn-retro btn-retro-ghost btn-retro-sm"
                  >
                    Resend
                  </button>
                </div>
              </div>

              <!-- Step 3: New password -->
              <div id="fpStep3" class="d-none">
                <div class="form-group">
                  <label class="form-label" for="fpNewPassword"
                    >New Password</label
                  >
                  <input
                    type="password"
                    id="fpNewPassword"
                    class="form-control-retro"
                    placeholder="Min. 4 characters"
                    autocomplete="new-password"
                    minlength="4"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label" for="fpConfirmPassword"
                    >Confirm Password</label
                  >
                  <input
                    type="password"
                    id="fpConfirmPassword"
                    class="form-control-retro"
                    placeholder="Repeat new password"
                    autocomplete="new-password"
                    minlength="4"
                  />
                </div>
                <div
                  id="fpStep3Error"
                  class="alert-retro alert-retro-danger d-none mb-3"
                  role="alert"
                ></div>
                <button
                  type="button"
                  id="fpResetBtn"
                  class="btn-retro btn-retro-primary btn-retro-full"
                >
                  🔒 Reset Password
                </button>
              </div>

              <!-- Success message -->
              <div
                id="fpSuccess"
                class="alert-retro alert-retro-success d-none mt-3"
                role="alert"
              ></div>
            </div>
          </div>

          <!-- Sign up link -->
          <div class="auth-divider mt-4">New here?</div>
          <div style="text-align: center; margin-top: 0.75rem">
            <button
              type="button"
              id="signupToggleBtn"
              class="btn-retro btn-retro-secondary btn-retro-sm"
            >
              ✦ Create Account
            </button>
          </div>

          <!-- Sign-up form (hidden by default) -->
          <form id="signupForm" class="d-none mt-3" novalidate>
            <div class="form-group">
              <label class="form-label" for="signupUsernameInput"
                >Choose Username</label
              >
              <input
                type="text"
                id="signupUsernameInput"
                class="form-control-retro"
                placeholder="username (min 3 chars)"
                autocomplete="off"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="signupEmailInput"
                >Email Address</label
              >
              <input
                type="email"
                id="signupEmailInput"
                class="form-control-retro"
                placeholder="your@email.com (for password reset)"
                autocomplete="email"
              />
              <small style="color: var(--text-muted); font-size: 0.72rem"
                >Optional but required for password reset</small
              >
            </div>
            <div class="form-group">
              <label class="form-label" for="signupPasswordInput"
                >Choose Password</label
              >
              <input
                type="password"
                id="signupPasswordInput"
                class="form-control-retro"
                placeholder="password (min 4 chars)"
                autocomplete="new-password"
                required
              />
            </div>
            <div
              id="signupError"
              class="alert-retro alert-retro-danger d-none mb-3"
              role="alert"
            ></div>
            <button
              type="submit"
              class="btn-retro btn-retro-primary btn-retro-full"
            >
              ▶ Create Account
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Auth modules (order matters) -->
    <script src="../js/auth-const.js"></script>
    <script src="../js/auth-session.js"></script>
    <script src="../js/auth-guest.js"></script>
    <script src="../js/auth-core.js"></script>
    <script src="../js/auth-theme.js"></script>
    <script src="../js/auth-nav.js"></script>
    <script src="../js/auth-profile.js"></script>
    <script src="../js/auth-user.js"></script>
    <script src="../js/auth-otp.js"></script>
    <script src="../js/auth.js"></script>

    <!-- Sign-in page logic -->
    <script>
      /**
       * Sign-in page script.
       * Handles role selection, form submission, forgot password OTP flow, and redirects.
       */

      // Redirect if already logged in
      redirectIfLoggedIn();

      // Apply saved theme on load
      loadTheme();

      // Update theme button text
      const themeBtn = document.getElementById("themeToggleBtn");
      if (themeBtn) {
        const isLight = document.body.classList.contains("light-mode");
        themeBtn.textContent = isLight ? "🌙 Dark" : "☀️ Light";
        themeBtn.addEventListener("click", toggleTheme);
      }

      // ---- Role Selection ----
      let selectedRole = "user"; // Default role

      const roleUserBtn = document.getElementById("roleUserBtn");
      const roleAdminBtn = document.getElementById("roleAdminBtn");

      roleUserBtn.addEventListener("click", function () {
        selectedRole = "user";
        roleUserBtn.classList.add("active");
        roleAdminBtn.classList.remove("active");
        roleUserBtn.setAttribute("aria-pressed", "true");
        roleAdminBtn.setAttribute("aria-pressed", "false");
      });

      roleAdminBtn.addEventListener("click", function () {
        selectedRole = "admin";
        roleAdminBtn.classList.add("active");
        roleUserBtn.classList.remove("active");
        roleAdminBtn.setAttribute("aria-pressed", "true");
        roleUserBtn.setAttribute("aria-pressed", "false");
      });

      // ---- Guest Mode ----
      const guestModeBtn = document.getElementById("guestModeBtn");
      if (guestModeBtn) {
        guestModeBtn.addEventListener("click", function () {
          startGuestSession();
          window.location.href = "../index.html";
        });
      }

      // ---- Sign-up Toggle ----
      const signupToggleBtn = document.getElementById("signupToggleBtn");
      const signupForm = document.getElementById("signupForm");
      if (signupToggleBtn && signupForm) {
        signupToggleBtn.addEventListener("click", function () {
          signupForm.classList.toggle("d-none");
          signupToggleBtn.textContent = signupForm.classList.contains("d-none")
            ? "✦ Create Account"
            : "✕ Cancel";
        });
      }

      // ---- Sign-up Form Submission ----
      if (signupForm) {
        signupForm.addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document
            .getElementById("signupUsernameInput")
            .value.trim();
          const email = document
            .getElementById("signupEmailInput")
            .value.trim();
          const password = document
            .getElementById("signupPasswordInput")
            .value.trim();
          const signupError = document.getElementById("signupError");

          if (!username || !password) {
            signupError.textContent = "Please fill in username and password.";
            signupError.classList.remove("d-none");
            return;
          }
          if (username.length < 3) {
            signupError.textContent = "Username must be at least 3 characters.";
            signupError.classList.remove("d-none");
            return;
          }
          if (password.length < 4) {
            signupError.textContent = "Password must be at least 4 characters.";
            signupError.classList.remove("d-none");
            return;
          }

          const result = createUser(username, password, "user");
          if (result.success) {
            // Save email if provided
            if (email && result.user) {
              updateUserEmail(result.user.id, email);
            }
            const loginResult = signIn(username, password, "user");
            if (loginResult.success) {
              window.location.href = "../index.html";
            }
          } else {
            signupError.textContent = result.message;
            signupError.classList.remove("d-none");
          }
        });
      }

      // ---- Form Submission ----
      const signinForm = document.getElementById("signinForm");
      const signinError = document.getElementById("signinError");
      const usernameInput = document.getElementById("usernameInput");
      const passwordInput = document.getElementById("passwordInput");

      signinForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        // Basic client-side validation
        if (!username || !password) {
          showError("Please enter both username and password.");
          return;
        }

        // Attempt sign-in using auth module
        const result = signIn(username, password, selectedRole);

        if (result.success) {
          // Redirect based on role
          if (result.user.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "../index.html";
          }
        } else {
          showError(result.message);
        }
      });

      /**
       * Shows an error message on the sign-in form.
       * @param {string} message
       */
      function showError(message) {
        signinError.textContent = message;
        signinError.classList.remove("d-none");
      }

      // ============================================================
      // FORGOT PASSWORD FLOW
      // ============================================================

      const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");
      const forgotPasswordSection = document.getElementById(
        "forgotPasswordSection",
      );
      const fpStep1 = document.getElementById("fpStep1");
      const fpStep2 = document.getElementById("fpStep2");
      const fpStep3 = document.getElementById("fpStep3");
      const fpSuccess = document.getElementById("fpSuccess");

      let fpVerifiedUserId = null; // Set after OTP verified

      // Toggle forgot password section
      forgotPasswordBtn.addEventListener("click", function () {
        forgotPasswordSection.classList.toggle("d-none");
        if (!forgotPasswordSection.classList.contains("d-none")) {
          // Reset to step 1
          fpStep1.classList.remove("d-none");
          fpStep2.classList.add("d-none");
          fpStep3.classList.add("d-none");
          fpSuccess.classList.add("d-none");
          document.getElementById("fpUsernameInput").value = "";
          document.getElementById("fpStep1Error").classList.add("d-none");
        }
      });

      // Step 1: Send OTP
      document
        .getElementById("fpSendOtpBtn")
        .addEventListener("click", async function () {
          const username = document
            .getElementById("fpUsernameInput")
            .value.trim();
          const errorEl = document.getElementById("fpStep1Error");
          const btn = this;

          if (!username) {
            errorEl.textContent = "Please enter your username.";
            errorEl.classList.remove("d-none");
            return;
          }

          const user = findUserByUsername(username);
          if (!user) {
            errorEl.textContent = "No account found with that username.";
            errorEl.classList.remove("d-none");
            return;
          }

          if (!user.email) {
            errorEl.textContent =
              "No email address on file for this account. Please contact an admin to reset your password.";
            errorEl.classList.remove("d-none");
            return;
          }

          errorEl.classList.add("d-none");
          btn.textContent = "⏳ Sending...";
          btn.disabled = true;

          const otp = generateOTP(username);
          if (!otp) {
            errorEl.textContent = "Failed to generate OTP. Please try again.";
            errorEl.classList.remove("d-none");
            btn.textContent = "📧 Send OTP to Email";
            btn.disabled = false;
            return;
          }

          const result = await sendOTPEmail(user.email, user.username, otp);

          btn.textContent = "📧 Send OTP to Email";
          btn.disabled = false;

          if (result.success) {
            // Show masked email hint
            const masked = user.email.replace(
              /(.{2})(.*)(@.*)/,
              function (_, a, b, c) {
                return a + "*".repeat(Math.max(2, b.length)) + c;
              },
            );
            document.getElementById("fpEmailHint").textContent =
              "OTP sent to " + masked + ". Check your inbox (and spam folder).";
            fpStep1.classList.add("d-none");
            fpStep2.classList.remove("d-none");
            // Store username for step 2
            fpStep2.dataset.username = username;
          } else {
            errorEl.textContent = result.message;
            errorEl.classList.remove("d-none");
          }
        });

      // Step 2: Verify OTP
      document
        .getElementById("fpVerifyOtpBtn")
        .addEventListener("click", function () {
          const username = fpStep2.dataset.username;
          const otp = document.getElementById("fpOtpInput").value.trim();
          const errorEl = document.getElementById("fpStep2Error");

          if (!otp || otp.length !== 6) {
            errorEl.textContent = "Please enter the 6-digit OTP.";
            errorEl.classList.remove("d-none");
            return;
          }

          const result = verifyOTP(username, otp);
          if (result.valid) {
            fpVerifiedUserId = result.userId;
            errorEl.classList.add("d-none");
            fpStep2.classList.add("d-none");
            fpStep3.classList.remove("d-none");
          } else {
            errorEl.textContent = result.message;
            errorEl.classList.remove("d-none");
          }
        });

      // Step 2: Resend OTP
      document
        .getElementById("fpResendOtpBtn")
        .addEventListener("click", async function () {
          const username = fpStep2.dataset.username;
          const errorEl = document.getElementById("fpStep2Error");
          const btn = this;

          btn.textContent = "⏳ Sending...";
          btn.disabled = true;

          const user = findUserByUsername(username);
          const otp = generateOTP(username);

          if (!otp || !user) {
            errorEl.textContent = "Failed to resend OTP.";
            errorEl.classList.remove("d-none");
            btn.textContent = "Resend";
            btn.disabled = false;
            return;
          }

          const result = await sendOTPEmail(user.email, user.username, otp);
          btn.textContent = "Resend";
          btn.disabled = false;

          if (result.success) {
            errorEl.className = "alert-retro alert-retro-success mb-3";
            errorEl.textContent = "OTP resent successfully.";
            errorEl.classList.remove("d-none");
            setTimeout(function () {
              errorEl.classList.add("d-none");
            }, 3000);
          } else {
            errorEl.className = "alert-retro alert-retro-danger mb-3";
            errorEl.textContent = result.message;
            errorEl.classList.remove("d-none");
          }
        });

      // Step 3: Reset password
      document
        .getElementById("fpResetBtn")
        .addEventListener("click", function () {
          const newPwd = document.getElementById("fpNewPassword").value;
          const confirmPwd = document.getElementById("fpConfirmPassword").value;
          const errorEl = document.getElementById("fpStep3Error");

          if (!newPwd || newPwd.length < 4) {
            errorEl.textContent = "Password must be at least 4 characters.";
            errorEl.classList.remove("d-none");
            return;
          }

          if (newPwd !== confirmPwd) {
            errorEl.textContent = "Passwords do not match.";
            errorEl.classList.remove("d-none");
            return;
          }

          if (!fpVerifiedUserId) {
            errorEl.textContent = "Session expired. Please start over.";
            errorEl.classList.remove("d-none");
            return;
          }

          const result = resetPasswordWithOTP(fpVerifiedUserId, newPwd);
          if (result.success) {
            fpStep3.classList.add("d-none");
            fpSuccess.textContent =
              "✓ " +
              result.message +
              " You can now sign in with your new password.";
            fpSuccess.classList.remove("d-none");
            fpVerifiedUserId = null;
          } else {
            errorEl.textContent = result.message;
            errorEl.classList.remove("d-none");
          }
        });
    </script>
  </body>
</html>
